    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #081b4b, #0c2a78, #1b3ea7);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Performance: Ensure canvas doesn't trigger layout shifts */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            contain: strict;
        }

        .container {
            z-index: 2;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h1 {
            /* Changed to H1 for SEO, styled like your previous H2 */
            text-align: center;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            margin-bottom: 5px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .controls input {
            grid-column: span 2;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid transparent;
            font-size: 18px;
            text-align: center;
            background: white;
            color: #081b4b;
            font-weight: bold;
            transition: border-color 0.3s;
        }

        /* Accessibility: Visual focus for keyboard users */
        .controls input:focus {
            outline: none;
            border-color: #f4c542;
        }

        .controls button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-hd {
            background: #f4c542;
            color: #081b4b;
        }

        .btn-4k {
            background: #ffd700;
            color: #081b4b;
        }

        .btn-share {
            background: #ffffff;
            color: #081b4b;
            grid-column: span 2;
            font-size: 16px;
        }

        .controls button:active {
            transform: scale(0.96);
        }

        .preview-area {
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            overflow: hidden;
            margin-top: 10px;
            aspect-ratio: 1080 / 1350;
            background: rgba(255, 255, 255, 0.05);
            /* Placeholder while image loads */
            border-radius: 2rem;
        }

        .scale-wrapper {
            position: absolute;
            top: 0;
            transform-origin: top center;
            will-change: transform;
        }

        .card {
            width: 1080px;
            height: 1350px;
            background: url("./eid-bg.png") center/cover no-repeat;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
        }

        .name-container {
            position: absolute;
            bottom: 320px;
            width: 100%;
            text-align: center;
            padding: 0 60px;
        }

        .name-text {
            font-size: 90px;
            color: #1b3ea7;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);

            /* Enabled Wrapping */
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.2;
            display: block;

            /* Ensure it doesn't push the card layout */
            max-width: 960px;
            /* Leave some padding */
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <canvas id="stars" aria-hidden="true"></canvas>

    <main class="container">
        <h1>اكتب اسمك على بطاقة العيد 🌙</h1>

        <section class="controls" aria-label="أدوات التحكم بالبطاقة">
            <label for="nameInput" class="sr-only" style="display:none;">الاسم</label>
            <input id="nameInput" type="text" placeholder="أدخل الاسم هنا..." maxlength="25"
                aria-label="أدخل الاسم الذي سيظهر على البطاقة">

            <button class="btn-hd" onclick="exportImage(2, 'hd')" aria-label="تحميل البطاقة بجودة عالية">
                <i class="fa-solid fa-image" aria-hidden="true"></i> تحميل HD
            </button>
            <button class="btn-4k" onclick="exportImage(4, '4k')" aria-label="تحميل البطاقة بجودة فائقة 4K">
                <i class="fa-solid fa-crown" aria-hidden="true"></i> تحميل 4K
            </button>
            <button class="btn-share" onclick="shareCard()" aria-label="مشاركة البطاقة مع الأصدقاء">
                <i class="fa-solid fa-share-nodes" aria-hidden="true"></i> إرسال البطاقة
            </button>
        </section>

        <article class="preview-area" aria-label="معاينة البطاقة">
            <div id="scaleWrapper" class="scale-wrapper">
                <div id="card" class="card">
                    <div class="name-container">
                        <div id="nameDisplay" class="name-text" aria-live="polite"></div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script>
        /** * PERFORMANCE & ACCESSIBILITY LOGIC
         */
        const nameInput = document.getElementById("nameInput");
        const nameDisplay = document.getElementById("nameDisplay");
        const scaleWrapper = document.getElementById("scaleWrapper");
        const card = document.getElementById("card");

        // Use a debounce or efficient update for font scaling
        nameInput.addEventListener("input", (e) => {
            const val = e.target.value.trim();
            nameDisplay.innerText = val || "";

            let size = 90;
            nameDisplay.style.fontSize = size + "px";

        });

        function resizePreview() {
            const containerWidth = document.querySelector('.preview-area').offsetWidth;
            const cardWidth = 1080;
            const scale = containerWidth / cardWidth;
            scaleWrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener("resize", resizePreview, { passive: true });
        window.addEventListener("load", resizePreview);

        async function capture(multiplier) {
            const originalTransform = scaleWrapper.style.transform;
            scaleWrapper.style.transform = "scale(1)";

            const canvas = await html2canvas(card, {
                scale: multiplier,
                useCORS: true,
                allowTaint: false,
                logging: false,
                width: 1080,
                height: 1350
            });

            scaleWrapper.style.transform = originalTransform;
            return canvas;
        }

        async function exportImage(m, label) {
            try {
                const canvas = await capture(m);
                const link = document.createElement("a");
                link.download = `Eid_Card_${label}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            } catch (e) {
                console.error("Export failed", e);
            }
        }

        async function shareCard() {
            try {
                const canvas = await capture(1.5);
                canvas.toBlob(async (blob) => {
                    if (!blob) return;
                    const file = new File([blob], "Eid_Greeting.png", { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'تهنئة العيد',
                            text: 'كل عام وأنتم بخير ✨'
                        });
                    } else {
                        alert("المشاركة المباشرة غير مدعومة في هذا المتصفح. يرجى تحميل الصورة أولاً.");
                    }
                }, 'image/png', 0.9);
            } catch (err) {
                console.error("Error sharing:", err);
            }
        }

        // Optimized Star Background Animation
        const starCanvas = document.getElementById("stars");
        const ctx = starCanvas.getContext("2d");
        let stars = [];

        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            stars = [];
            const count = window.innerWidth < 500 ? 50 : 100; // Performance: Fewer stars on mobile
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    size: Math.random() * 2,
                    speed: 0.1 + Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if (s.y > starCanvas.height) s.y = 0;
            }
            requestAnimationFrame(drawStars);
        }

        window.addEventListener("resize", initStars, { passive: true });
        initStars();
        drawStars();
    </script>
</body>

</html>
